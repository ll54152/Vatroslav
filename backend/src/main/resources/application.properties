spring.application.name=Vatroslav-Backend

spring.config.import=optional:file:.env[.properties]

server.address=0.0.0.0
server.port=8080
server.shutdown=graceful

#spring.lifecycle.timeout-per-shutdown-phase=30s

#logging.file.name=/var/log/vatroslav-backend/vatroslav.log

spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:passwordExample}

spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:passwordExample}
app.admin.firstName=${ADMIN_FIRSTNAME:Admin}
app.admin.lastName=${ADMIN_LASTNAME:User}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:usernameExample}
spring.mail.password=${MAIL_PASSWORD:passwordExample}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend.url=${APP_FRONTEND_URL}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:5173}